name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          # Chạy container và lưu ID vào biến môi trường
          CONTAINER_ID=$(docker run -d --rm -p 8000:8000 -e API_TOKEN=secret_api_token fit4110/iot-ingestion:lab04)
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV
          
          # Đợi app khởi động
          sleep 5
          
          # Kiểm tra logs bằng ID vừa lưu
          docker logs $CONTAINER_ID

      - name: Wait for service health
        run: npx wait-on http://localhost:8000/health --timeout 60000

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs $CONTAINER_ID || true

      - name: Stop container
        if: always()
        run: docker stop $CONTAINER_ID || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
