name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          # 1. Chạy container
          docker run -d --name fit4110-iot-lab04 -p 8000:8000 -e API_TOKEN=secret_api_token fit4110/iot-ingestion:lab04
          
          # 2. Đợi để log kịp sinh ra
          sleep 5
          
          # 3. Kiểm tra xem container còn sống không
          if [ "$(docker inspect -f '{{.State.Running}}' fit4110-iot-lab04)" != "true" ]; then
            echo "Container đã bị crash! Xem logs:"
            docker logs fit4110-iot-lab04
            exit 1
          fi
          
      - name: Wait for service health
        run: npx wait-on http://localhost:8000/health --timeout 60000

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
